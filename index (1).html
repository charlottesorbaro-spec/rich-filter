<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Rich · John Richmond</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Cormorant Garamond',serif;}

  #loading{
    position:fixed;inset:0;background:#0a0609;display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:100;transition:opacity 0.8s ease;
  }
  #loading.hidden{opacity:0;pointer-events:none;}
  .load-brand{font-size:11px;letter-spacing:.4em;color:#9a7a50;text-transform:uppercase;margin-bottom:12px;}
  .load-title{font-size:52px;font-style:italic;font-weight:300;color:#f0e0bc;letter-spacing:.1em;
    text-shadow:0 0 40px rgba(201,169,110,0.4);}
  .load-bar{width:120px;height:1px;background:rgba(201,169,110,0.2);margin-top:28px;overflow:hidden;}
  .load-bar-fill{height:100%;background:#c9a96e;width:0%;transition:width 0.3s;}
  .load-status{margin-top:16px;font-size:10px;letter-spacing:.2em;color:#4a3520;text-transform:uppercase;}
  .load-skip{
    margin-top:28px;font-size:10px;letter-spacing:.25em;color:#6a5035;text-transform:uppercase;
    background:transparent;border:1px solid #3a2a1a;padding:8px 20px;cursor:pointer;
    font-family:'Cormorant Garamond',serif;display:none;
  }
  .load-skip:hover{border-color:#c9a96e;color:#c9a96e;}

  #scene{position:fixed;inset:0;}
  video#cam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  canvas#overlay{position:absolute;inset:0;width:100%;height:100%;}

  #ui-bottom{
    position:fixed;bottom:0;left:0;right:0;padding:0 0 44px;
    background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 100%);
    display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;
  }
  .ui-brand{font-size:10px;letter-spacing:.38em;color:#c9a96e;text-transform:uppercase;opacity:.85;}
  .ui-name{font-size:42px;font-style:italic;font-weight:300;color:#f0e0bc;letter-spacing:.12em;
    text-shadow:0 0 24px rgba(201,169,110,0.5);}
  .ui-tag{font-size:9px;letter-spacing:.22em;color:#9a7a50;text-transform:uppercase;}

  .corner{width:20px;height:20px;border-color:#c9a96e;border-style:solid;position:fixed;opacity:.55;}
  .corner.tl{top:16px;left:16px;border-width:1px 0 0 1px;}
  .corner.tr{top:16px;right:16px;border-width:1px 1px 0 0;}
  .corner.bl{bottom:16px;left:16px;border-width:0 0 1px 1px;}
  .corner.br{bottom:16px;right:16px;border-width:0 1px 1px 0;}

  #hint{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:11px;letter-spacing:.28em;color:rgba(201,169,110,0.7);text-transform:uppercase;
    border:1px solid rgba(201,169,110,0.25);padding:12px 22px;pointer-events:none;
    opacity:0;transition:opacity .5s;text-align:center;line-height:2;
  }
  #hint.show{opacity:1;}

  #snap-btn{
    position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
    width:70px;height:70px;border-radius:50%;
    border:3px solid rgba(255,255,255,0.9);background:transparent;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  #snap-btn:active{transform:translateX(-50%) scale(.92);}
  #snap-inner{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.9);}
  #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .05s;}
  #saved-msg{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.75);color:#f0e0bc;font-size:13px;letter-spacing:.15em;
    padding:14px 28px;border:1px solid rgba(201,169,110,0.4);opacity:0;
    transition:opacity .3s;pointer-events:none;text-align:center;
  }
  #saved-msg.show{opacity:1;}
</style>
</head>
<body>

<div id="loading">
  <div class="load-brand">John Richmond</div>
  <div class="load-title">Rich</div>
  <div class="load-bar"><div class="load-bar-fill" id="load-fill"></div></div>
  <div class="load-status" id="load-status">Starting camera…</div>
  <button class="load-skip" id="skip-btn" onclick="skipMode()">Skip →</button>
</div>

<div id="scene">
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div id="hint">Smile and show your teeth<br>to reveal the grill</div>

<div id="ui-bottom">
  <div class="ui-brand">John Richmond</div>
  <div class="ui-name">Rich</div>
  <div class="ui-tag">Dare to be legendary</div>
</div>

<button id="snap-btn" aria-label="Capture"><div id="snap-inner"></div></button>
<div id="flash"></div>
<div id="saved-msg"></div>

<script>
const video = document.getElementById('cam');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const loadFill = document.getElementById('load-fill');
const loadStatus = document.getElementById('load-status');
const loadingEl = document.getElementById('loading');
const skipBtn = document.getElementById('skip-btn');
const hint = document.getElementById('hint');

let frameCount = 0;
let faceMode = false;
let lastFace = null;
let grillOpacity = 0; // smooth fade in/out
let particles = [];
let hintShown = false;

function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);
function setStatus(t,p){ loadStatus.textContent=t; loadFill.style.width=p+'%'; }
setTimeout(()=>{ skipBtn.style.display='block'; },5000);

async function startCamera(){
  setStatus('Starting camera…',20);
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false});
    video.srcObject=s; await video.play(); setStatus('Camera ready',40); return true;
  } catch(e){ setStatus('Camera error — allow access',40); return false; }
}

function skipMode(){
  faceMode=false;
  // show hint in basic mode
  hint.classList.add('show');
  setTimeout(()=>hint.classList.remove('show'),3000);
  finishLoading();
}

function finishLoading(){
  loadFill.style.width='100%';
  setTimeout(()=>loadingEl.classList.add('hidden'),500);
  // Show hint after loading
  setTimeout(()=>{ hint.classList.add('show'); setTimeout(()=>hint.classList.remove('show'),3500); },1200);
  requestAnimationFrame(loop);
}

async function tryLoadScript(src, timeout=8000){
  return new Promise(res=>{
    const s=document.createElement('script');
    s.src=src; s.onload=()=>res(true); s.onerror=()=>res(false);
    setTimeout(()=>res(false),timeout);
    document.head.appendChild(s);
  });
}

async function tryLoadModels(){
  const U='https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';
  try{
    await Promise.race([
      Promise.all([
        window.faceapi.nets.tinyFaceDetector.loadFromUri(U),
        window.faceapi.nets.faceLandmark68Net.loadFromUri(U),
      ]),
      new Promise((_,r)=>setTimeout(()=>r('timeout'),12000))
    ]);
    return true;
  } catch(e){ return false; }
}

async function init(){
  const camOk=await startCamera();
  if(!camOk){ finishLoading(); return; }
  setStatus('Loading face detection…',55);
  const apiOk=await tryLoadScript('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js');
  if(!apiOk){ setStatus('Using basic mode',85); setTimeout(finishLoading,600); return; }
  setStatus('Loading landmarks…',72);
  const modOk=await tryLoadModels();
  if(!modOk){ setStatus('Using basic mode',90); setTimeout(finishLoading,600); return; }
  faceMode=true;
  setStatus('Ready',100);
  startDetection();
  setTimeout(finishLoading,400);
}

function startDetection(){
  setInterval(async()=>{
    if(!window.faceapi||video.readyState<2) return;
    try{
      const opts=new window.faceapi.TinyFaceDetectorOptions({inputSize:320,scoreThreshold:0.35});
      const r=await window.faceapi.detectSingleFace(video,opts).withFaceLandmarks();
      lastFace=r||null;
    } catch(e){ lastFace=null; }
  },80);
}

// ---- Mouth open detection ----
// Returns 0-1: how open the mouth is, based on inner lip distance vs face height
function getMouthOpenness(landmarks, scaleX, scaleY, faceH){
  const mouth=landmarks.getMouth();
  const flip=x=>canvas.width-x*scaleX;
  const fy=y=>y*scaleY;
  // point 13 = upper inner lip center, point 19 = lower inner lip center (0-indexed in 20pt mouth)
  const topLip = {x:flip(mouth[13].x), y:fy(mouth[13].y)};
  const botLip = {x:flip(mouth[19].x), y:fy(mouth[19].y)};
  const openPx = Math.abs(botLip.y - topLip.y);
  const ratio = openPx / (faceH * 0.12);
  return Math.min(Math.max(ratio, 0), 1);
}

// ---- Map landmark points to canvas coords ----
function mapPt(pt, sx, sy){
  return { x: canvas.width - pt.x*sx, y: pt.y*sy };
}

// ---- Draw gold grill fitted to upper teeth ----
// upperLipPts: the upper lip inner edge (landmarks 60-64 in 68-pt model)
// lowerLipPts: the lower lip inner edge (landmarks 64-68)
function drawGrill(upperLipPts, lowerLipPts, openness, alpha){
  if(alpha <= 0.01) return;

  // Upper teeth line = just below upper inner lip
  // Lower teeth line = just above lower inner lip
  // We draw the grill filling this gap

  const letters = ['R','I','C','H'];
  const n = letters.length;

  // Bounding box of the inner mouth opening
  const allPts = [...upperLipPts, ...lowerLipPts];
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  allPts.forEach(p=>{ minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x); minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y); });

  const mouthW = maxX - minX;
  const mouthH = maxY - minY;

  // Upper grill sits on the upper teeth (top half of mouth opening)
  const grillTop = minY;
  const grillBot = minY + mouthH * 0.52;
  const grillH = grillBot - grillTop;
  const grillLeft = minX;
  const grillRight = maxX;
  const toothW = mouthW / n;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Clip to the mouth opening shape so grill wraps the curve
  ctx.beginPath();
  // upper lip curve (points 0-4 of upper inner lip = mouth pts 60-64)
  ctx.moveTo(upperLipPts[0].x, upperLipPts[0].y);
  for(let i=1;i<upperLipPts.length;i++) ctx.lineTo(upperLipPts[i].x, upperLipPts[i].y);
  // lower boundary = just extend down by grillH
  ctx.lineTo(upperLipPts[upperLipPts.length-1].x, upperLipPts[upperLipPts.length-1].y + grillH*1.3);
  ctx.lineTo(upperLipPts[0].x, upperLipPts[0].y + grillH*1.3);
  ctx.closePath();
  ctx.clip();

  // Draw each tooth
  for(let i=0;i<n;i++){
    const tx = grillLeft + i * toothW;
    const gap = toothW * 0.05;

    // Follow the curve of the upper lip for tooth top
    // Interpolate y along upper lip points
    const progress = (i + 0.5) / n;
    const lipIdx = progress * (upperLipPts.length - 1);
    const li = Math.floor(lipIdx);
    const lf = lipIdx - li;
    const lipY = li < upperLipPts.length-1
      ? upperLipPts[li].y * (1-lf) + upperLipPts[li+1].y * lf
      : upperLipPts[li].y;

    const toothTop = lipY + 1;
    const toothHeight = grillH * 1.1;

    // Gold gradient per tooth
    const grad = ctx.createLinearGradient(tx, toothTop, tx, toothTop + toothHeight);
    grad.addColorStop(0, '#fff5a0');
    grad.addColorStop(0.15, '#ffe566');
    grad.addColorStop(0.4, '#c9a96e');
    grad.addColorStop(0.75, '#9a7040');
    grad.addColorStop(1, '#6a4a20');
    ctx.fillStyle = grad;
    ctx.shadowColor = 'rgba(255,210,80,0.5)';
    ctx.shadowBlur = 8;

    // Tooth body
    roundRect(ctx, tx+gap, toothTop, toothW-gap*2, toothHeight, Math.min(toothW*0.12, 5));
    ctx.fill();

    // Shine
    const shine = ctx.createLinearGradient(tx+gap, toothTop, tx+gap, toothTop+toothHeight*0.4);
    shine.addColorStop(0,'rgba(255,255,230,0.6)');
    shine.addColorStop(1,'rgba(255,255,230,0)');
    ctx.fillStyle=shine; ctx.shadowBlur=0;
    roundRect(ctx, tx+gap+toothW*0.1, toothTop+2, toothW*0.35, toothHeight*0.35, 3);
    ctx.fill();

    // Gap shadow between teeth
    if(i>0){
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(tx, toothTop, gap*2, toothHeight);
    }

    // Letter
    const fontSize = Math.max(toothHeight*0.5, 9);
    ctx.font = `900 ${fontSize}px Arial Black,Arial,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    // shadow
    ctx.fillStyle='rgba(60,35,5,0.6)'; ctx.shadowBlur=0;
    ctx.fillText(letters[i], tx+toothW/2+1, toothTop+toothHeight*0.5+1);
    // letter
    ctx.fillStyle='#fffde8';
    ctx.shadowColor='rgba(255,240,120,0.8)'; ctx.shadowBlur=5;
    ctx.fillText(letters[i], tx+toothW/2, toothTop+toothHeight*0.5);
  }

  ctx.restore();

  // Top bar (grill frame) — outside clip
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor='rgba(255,200,60,0.7)'; ctx.shadowBlur=10;
  const barH = Math.max(grillH*0.18, 5);

  // Follow upper lip curve for the bar
  ctx.beginPath();
  ctx.moveTo(upperLipPts[0].x, upperLipPts[0].y - barH);
  for(let i=1;i<upperLipPts.length;i++) ctx.lineTo(upperLipPts[i].x, upperLipPts[i].y - barH);
  for(let i=upperLipPts.length-1;i>=0;i--) ctx.lineTo(upperLipPts[i].x, upperLipPts[i].y + 2);
  ctx.closePath();
  const barGrad = ctx.createLinearGradient(grillLeft, grillTop-barH, grillLeft, grillTop+2);
  barGrad.addColorStop(0,'#ffe880');
  barGrad.addColorStop(0.5,'#c9a96e');
  barGrad.addColorStop(1,'#8a6030');
  ctx.fillStyle=barGrad; ctx.fill();

  // Vertical dividers on bar
  ctx.fillStyle='rgba(120,80,20,0.4)';
  for(let i=1;i<n;i++){
    const dx = grillLeft + i*(mouthW/n);
    ctx.fillRect(dx-1, grillTop-barH, 2, barH+2);
  }
  ctx.restore();

  // Gold sparkle particles on grill when visible
  if(alpha > 0.6 && frameCount%6===0){
    const cx = (grillLeft+grillRight)/2;
    spawnParticles(cx, grillTop, mouthW);
  }
}

// ---- Particles ----
function spawnParticles(cx, y, w){
  for(let i=0;i<2;i++){
    particles.push({
      x:cx+(Math.random()-.5)*w,
      y:y+(Math.random()-.5)*6,
      vx:(Math.random()-.5)*.7,
      vy:-(0.4+Math.random()*.9),
      life:1, decay:0.022+Math.random()*.018,
      size:.7+Math.random()*1.6
    });
  }
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.015; p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.save();
    ctx.globalAlpha=p.life*.8;
    ctx.fillStyle='#c9a96e';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function roundRect(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ---- Main loop ----
function loop(t){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const W=canvas.width, H=canvas.height;

  if(faceMode && lastFace){
    const lm=lastFace.landmarks;
    const box=lastFace.detection.box;
    const sx=W/(video.videoWidth||W);
    const sy=H/(video.videoHeight||H);

    const faceH=box.height*sy;
    const openness=getMouthOpenness(lm,sx,sy,faceH);

    // Smooth fade: appear when openness > 0.35, full at 0.6
    const targetAlpha = openness > 0.35 ? Math.min((openness-0.35)/0.25, 1) : 0;
    grillOpacity += (targetAlpha - grillOpacity) * 0.18;

    // Get mouth landmark points (68-point model: 48-67 = mouth)
    // Inner upper lip: 60-64 (indices 60,61,62,63,64)
    // Inner lower lip: 64,65,66,67,60
    const allPts=lm.positions;
    const flip=x=>W-x*sx;
    const fy=y=>y*sy;

    // Upper inner lip: points 60-64
    const upperInner=[60,61,62,63,64].map(i=>({x:flip(allPts[i].x),y:fy(allPts[i].y)}));
    // Lower inner lip: points 64-67,60
    const lowerInner=[64,65,66,67,60].map(i=>({x:flip(allPts[i].x),y:fy(allPts[i].y)}));

    drawGrill(upperInner, lowerInner, openness, grillOpacity);
  } else if(!faceMode){
    // Basic mode: always show grill centered lower in frame
    grillOpacity += (1 - grillOpacity) * 0.08;
    const cx=W/2, cy=H*0.63;
    const mw=Math.min(W*0.42,190);
    // Fake upper lip curve (slight arc)
    const arc=mw*0.04;
    const upperFake=[
      {x:cx-mw/2, y:cy-arc},
      {x:cx-mw/4, y:cy-arc*1.5},
      {x:cx,       y:cy-arc*2},
      {x:cx+mw/4, y:cy-arc*1.5},
      {x:cx+mw/2, y:cy-arc}
    ];
    const lowerFake=[
      {x:cx+mw/2, y:cy+arc},
      {x:cx+mw/4, y:cy+arc*1.5},
      {x:cx,       y:cy+arc*2},
      {x:cx-mw/4, y:cy+arc*1.5},
      {x:cx-mw/2, y:cy+arc}
    ];
    drawGrill(upperFake, lowerFake, 1, grillOpacity);
  }

  drawParticles();
  frameCount++;
}

// ---- Capture ----
document.getElementById('snap-btn').addEventListener('click',()=>{
  const flash=document.getElementById('flash');
  flash.style.transition='opacity .05s'; flash.style.opacity='1';
  setTimeout(()=>{ flash.style.transition='opacity .4s'; flash.style.opacity='0'; },80);
  const out=document.createElement('canvas');
  out.width=canvas.width; out.height=canvas.height;
  const oc=out.getContext('2d');
  oc.save(); oc.scale(-1,1); oc.translate(-out.width,0);
  oc.drawImage(video,0,0,out.width,out.height); oc.restore();
  oc.drawImage(canvas,0,0);
  oc.font='300 italic 38px Cormorant Garamond,Georgia,serif';
  oc.fillStyle='rgba(240,224,188,0.92)'; oc.textAlign='center';
  oc.fillText('Rich',out.width/2,out.height-60);
  oc.font='300 11px Cormorant Garamond,Georgia,serif';
  oc.fillStyle='rgba(154,122,80,0.85)';
  oc.fillText('JOHN RICHMOND',out.width/2,out.height-38);
  const link=document.createElement('a');
  link.href=out.toDataURL('image/jpeg',.92); link.download='rich-johnrichmond.jpg'; link.click();
  const msg=document.getElementById('saved-msg');
  msg.textContent='Photo saved'; msg.classList.add('show');
  setTimeout(()=>msg.classList.remove('show'),2200);
});

init();
</script>
</body>
</html>
