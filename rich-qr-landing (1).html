<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rich · John Richmond — AR Filter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    min-height:100vh;background:#0a0609;
    font-family:'Cormorant Garamond',serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 24px;
    position:relative;overflow:hidden;
  }

  /* Subtle grain overlay */
  body::before{
    content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity:.4;pointer-events:none;
  }

  .corner{width:22px;height:22px;border-color:#c9a96e;border-style:solid;position:fixed;opacity:.5;}
  .corner.tl{top:18px;left:18px;border-width:1px 0 0 1px;}
  .corner.tr{top:18px;right:18px;border-width:1px 1px 0 0;}
  .corner.bl{bottom:18px;left:18px;border-width:0 0 1px 1px;}
  .corner.br{bottom:18px;right:18px;border-width:0 1px 1px 0;}

  .brand{font-size:10px;letter-spacing:.42em;color:#9a7a50;text-transform:uppercase;margin-bottom:8px;text-align:center;}
  .title{
    font-size:80px;font-style:italic;font-weight:300;color:#f0e0bc;letter-spacing:.1em;
    text-shadow:0 0 60px rgba(201,169,110,0.35);line-height:1;margin-bottom:6px;text-align:center;
  }
  .subtitle{font-size:10px;letter-spacing:.28em;color:#6a5035;text-transform:uppercase;text-align:center;margin-bottom:44px;}

  .qr-wrap{
    position:relative;padding:2px;
    background:linear-gradient(135deg,#c9a96e,#6a4e2a,#c9a96e);
    margin-bottom:36px;
  }
  .qr-inner{background:#0a0609;padding:16px;}
  #qr-canvas{display:block;}

  .qr-label{font-size:9px;letter-spacing:.3em;color:#9a7a50;text-transform:uppercase;text-align:center;margin-bottom:28px;}

  .cta-btn{
    display:inline-block;padding:14px 44px;
    border:1px solid #c9a96e;color:#c9a96e;
    font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.3em;
    text-transform:uppercase;text-decoration:none;background:transparent;cursor:pointer;
    transition:background .25s, color .25s;
    margin-bottom:12px;
  }
  .cta-btn:hover{background:#c9a96e;color:#0a0609;}

  .instructions{
    font-size:11px;letter-spacing:.12em;color:#4a3520;text-align:center;line-height:2.2;
    margin-top:4px;
  }
  .instructions span{color:#9a7a50;}

  .divider{width:1px;height:40px;background:linear-gradient(to bottom,transparent,#6a4e2a,transparent);margin:32px auto;}

  .how-wrap{display:flex;gap:32px;margin-top:4px;justify-content:center;flex-wrap:wrap;}
  .how-step{display:flex;flex-direction:column;align-items:center;gap:8px;max-width:90px;}
  .how-num{
    width:28px;height:28px;border:1px solid rgba(201,169,110,0.4);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-style:italic;color:#c9a96e;
  }
  .how-text{font-size:10px;letter-spacing:.1em;color:#6a5035;text-align:center;line-height:1.6;text-transform:uppercase;}

  .url-display{
    margin-top:36px;font-size:9px;letter-spacing:.2em;color:#3a2a18;text-align:center;
    border-top:1px solid rgba(201,169,110,0.12);padding-top:16px;width:100%;max-width:300px;
  }
  .url-display span{color:#6a5035;}
</style>
</head>
<body>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="brand">John Richmond</div>
<div class="title">Rich</div>
<div class="subtitle">Exclusive AR Experience</div>

<div class="qr-wrap">
  <div class="qr-inner">
    <canvas id="qr-canvas" width="200" height="200"></canvas>
  </div>
</div>
<div class="qr-label">Scan with your phone camera</div>

<a href="rich-filter.html" class="cta-btn" id="open-btn">Open Filter</a>

<div class="instructions">
  <span>Point your camera</span> at the QR code<br>
  <span>Allow camera access</span> when prompted<br>
  <span>Face the screen</span> to activate the filter
</div>

<div class="divider"></div>

<div class="how-wrap">
  <div class="how-step"><div class="how-num">I</div><div class="how-text">Scan the code</div></div>
  <div class="how-step"><div class="how-num">II</div><div class="how-text">Allow camera</div></div>
  <div class="how-step"><div class="how-num">III</div><div class="how-text">Try the filter</div></div>
  <div class="how-step"><div class="how-num">IV</div><div class="how-text">Save & share</div></div>
</div>

<div class="url-display">Filter URL: <span id="url-text">rich-filter.html</span></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  // Generate QR pointing to the filter page
  // In production, replace this URL with your actual hosted URL
  const filterURL = window.location.href.replace('rich-qr-landing.html','rich-filter.html');
  document.getElementById('url-text').textContent = filterURL;
  document.getElementById('open-btn').href = filterURL;

  new QRCode(document.getElementById('qr-canvas'), {
    text: filterURL,
    width: 200,
    height: 200,
    colorDark: '#c9a96e',
    colorLight: '#0a0609',
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
